name: Upload to S3

on:
  push:
    branches:
      - main

    paths:
      - movielist.json
      - .github/workflows/workflow.yml

jobs:
  minify-and-upload-to-s3:

    permissions:
      id-token: write
      contents: read

    runs-on: ubuntu-latest

    steps:
      - name: Check Out Code
        uses: actions/checkout@v6

      - name: Minify json
        run: jq --compact-output '.lists |= map(select(.hidden != true))' movielist.json > movielist.min.json

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/movielist.github-update
          role-session-name: github-upload
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Upload to S3
        env:
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          AWS_BUCKET: list-of-lists-${{ secrets.AWS_ACCOUNT_ID }}-${{ secrets.AWS_DEFAULT_REGION }}-an
        run: aws s3 cp movielist.min.json s3://${AWS_BUCKET}/moviel.ist.json
